name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: make lint

      - name: Build
        run: make build

      - name: Test (unit)
        run: make test

      - name: Docs check
        run: make docs-check

      - name: Code check
        run: make code-check

      - name: Full quality gate (check)
        run: make check
